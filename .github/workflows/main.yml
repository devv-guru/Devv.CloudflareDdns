name: .NET Release & NuGet Publish

on:
  push:
    branches:
      - main

env:
  BUILD_CONFIGURATION: Release
  PROJECT: '_src/Devv.CloudflareDdns/Devv.CloudflareDdns.csproj'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT }}

      - name: Build
        run: dotnet build ${{ env.PROJECT }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal

      - name: Pack
        run: |
          dotnet pack ${{ env.PROJECT }} \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-build \
            --output ./artifacts

      - name: Push package to NuGet.org
        if: success()
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key $NUGET_API_KEY \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
